name: Build Android AAB + APK

on:
  push:
    paths:
      - 'pawtrait-send/**'
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pawtrait-send

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Install JS dependencies
        run: npm install

      - name: Generate debug keystore
        run: |
          cd android/app
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v -keystore debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Set up release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android/app
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Decoding release keystore from secret..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret found — generating new keystore..."
            echo "⚠️  IMPORTANT: Download the keystore artifact and save as GitHub secret!"
            STORE_PASS="${KEYSTORE_PASSWORD:-PawtraitSend2026}"
            K_PASS="${KEY_PASSWORD:-PawtraitSend2026}"
            keytool -genkeypair -v -keystore release.keystore \
              -storepass "$STORE_PASS" -alias pawtrait-send -keypass "$K_PASS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Pawtrait Pals LLC,O=Pawtrait Pals LLC,L=Woodstock,ST=Georgia,C=US"
          fi

      - name: Build release AAB (for Play Store)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-PawtraitSend2026}"
          export KEY_PASSWORD="${KEY_PASSWORD:-PawtraitSend2026}"
          cd android
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Build release APK (for sideloading)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-PawtraitSend2026}"
          export KEY_PASSWORD="${KEY_PASSWORD:-PawtraitSend2026}"
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawtrait-send-aab-v${{ github.run_number }}
          path: pawtrait-send/android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawtrait-send-apk-v${{ github.run_number }}
          path: pawtrait-send/android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release keystore (save this!)
        if: ${{ !env.RELEASE_KEYSTORE_BASE64 }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore-SAVE-THIS
          path: pawtrait-send/android/app/release.keystore
          retention-days: 90
